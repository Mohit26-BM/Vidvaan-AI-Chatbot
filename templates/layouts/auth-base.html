<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Sign in to your Vidvaan account{% endblock %}">
    <title>{% block title %}Sign In - Vidvaan{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    
    <!-- Auth Page Styles -->
    {% block styles %}
    <!-- Child templates provide their specific CSS here -->
    {% endblock %}
    
    <!-- Common Auth Styles -->
    <style>
        /* These styles are shared across all auth pages */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Prevent flash of unstyled content */
        body {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        body.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Main Auth Content -->
    {% block content %}
    <!-- Child templates (login.html, signup.html) provide content here -->
    {% endblock %}
    
    <!-- Flash Messages (Server-side notifications) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div id="flash-container">
                {% for category, message in messages %}
                    <div class="auth-flash auth-flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    
    <!-- Auth Base Scripts -->
    <script>
        // Show body after CSS loaded (prevent FOUC)
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('loaded');
            
            // Auto-dismiss flash messages
            const flashMessages = document.querySelectorAll('.auth-flash');
            flashMessages.forEach(msg => {
                setTimeout(() => msg.classList.add('show'), 100);
                setTimeout(() => {
                    msg.classList.remove('show');
                    setTimeout(() => msg.remove(), 300);
                }, 5000);
            });
        });
        
        // Handle browser back button (clear form on back navigation)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                // Page is loaded from cache (back button)
                const forms = document.querySelectorAll('form');
                forms.forEach(form => form.reset());
            }
        });
    </script>
    
    <!-- Flash Messages Styles -->
    <style>
        #flash-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        
        .auth-flash {
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            color: white;
            font-size: 0.875rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.3s ease;
            max-width: 400px;
            pointer-events: auto;
        }
        
        .auth-flash.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .auth-flash-success {
            border: 1px solid #10b981;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        
        .auth-flash-error {
            border: 1px solid #ef4444;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        
        .auth-flash-info {
            border: 1px solid #6366f1;
            background: rgba(99, 102, 241, 0.15);
            color: #6366f1;
        }
        
        .auth-flash-warning {
            border: 1px solid #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        
        @media (max-width: 640px) {
            #flash-container {
                right: 10px;
                left: 10px;
            }
            
            .auth-flash {
                max-width: none;
            }
        }
    </style>
    
    <!-- Child template scripts -->
    {% block scripts %}
    <!-- Child templates can add their own scripts here -->
    {% endblock %}
</body>
</html>
